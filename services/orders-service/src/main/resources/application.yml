spring:
  application:
    name: orders-service

server:
  port: ${ORDERS_SERVICE_PORT:8080}

management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

orders-service:
  security:
    issuer-uri: ${ORDERS_SERVICE_SECURITY_ISSUER_URI:http://localhost:18080/issuer}
    jwk-set-uri: ${ORDERS_SERVICE_SECURITY_JWK_SET_URI:http://localhost:18080/.well-known/jwks.json}
    audience: ${ORDERS_SERVICE_SECURITY_AUDIENCE:orders-service}
    roles-claim: ${ORDERS_SERVICE_SECURITY_ROLES_CLAIM:ROLES}
  authz:
    role-access-key-prefix: ${ORDERS_SERVICE_AUTHZ_ROLE_ACCESS_KEY_PREFIX:role_access:}
    local-cache-ttl: ${ORDERS_SERVICE_AUTHZ_LOCAL_CACHE_TTL:PT5S}
  redis-url: ${ORDERS_SERVICE_REDIS_URL:redis://localhost:6379}